# Ensures the CLI's pinned rlmagents version matches the actual rlmagents version.
#
# Only runs on CLI release PRs to catch version mismatches before publishing.
# The CLI pins an exact rlmagents version (e.g. rlmagents==0.0.1) and this check
# prevents releasing a CLI that depends on a version that doesn't exist.

name: "🔍 Check CLI SDK Pin"

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read

jobs:
  check_cli_sdk_pin:
    if: startsWith(github.event.pull_request.title, 'release(rlmagents-cli)')
    runs-on: [self-hosted, Linux]

    steps:
      - uses: actions/checkout@v6

      - name: "✅ Verify CLI rlmagents pin matches rlmagents version"
        run: |
          RLMAGENTS_VERSION=$(grep -Po '(?<=^version = ")[^"]*' libs/rlmagents/pyproject.toml)
          CLI_RLMAGENTS_PIN=$(grep -Po '(?<=rlmagents==)[^"]*' libs/cli/pyproject.toml)

          if [ -z "$RLMAGENTS_VERSION" ]; then
            echo "Error: Could not extract rlmagents version from libs/rlmagents/pyproject.toml"
            exit 1
          fi

          if [ -z "$CLI_RLMAGENTS_PIN" ]; then
            echo "Error: Could not extract CLI rlmagents pin from libs/cli/pyproject.toml"
            exit 1
          fi

          if [ "$RLMAGENTS_VERSION" != "$CLI_RLMAGENTS_PIN" ]; then
            echo "Error: CLI rlmagents pin does not match rlmagents version!"
            echo "rlmagents version (libs/rlmagents/pyproject.toml): $RLMAGENTS_VERSION"
            echo "CLI rlmagents pin (libs/cli/pyproject.toml): $CLI_RLMAGENTS_PIN"
            echo ""
            echo "Update the rlmagents dependency in libs/cli/pyproject.toml to rlmagents==$RLMAGENTS_VERSION"
            exit 1
          else
            echo "CLI rlmagents pin matches rlmagents version: $RLMAGENTS_VERSION"
          fi
