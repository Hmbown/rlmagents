# Main CI workflow for RLMAgents monorepo
#
# Runs on every pull request:
# - Linting for changed packages
# - Unit tests for changed packages
#
# Only packages with changes are tested. Workflow/action changes run full CI.
# Pushes to main run full CI.

name: "🔧 CI"

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

# Cancel redundant workflow runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  UV_NO_SYNC: "true"

jobs:
  # Detect which packages have changes
  changes:
    name: "🔍 Detect Changes"
    runs-on: [self-hosted, Linux]
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      rlmagents: ${{ steps.filter.outputs.rlmagents }}
      acp: ${{ steps.filter.outputs.acp }}
    steps:
      - name: "📋 Checkout Code"
        uses: actions/checkout@v6

      - name: "🔍 Check for changes"
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cli:
              - "libs/cli/**"
              - "libs/rlmagents/**"
              - ".github/workflows/**"
              - ".github/actions/**"
            rlmagents:
              - "libs/rlmagents/**"
              - ".github/workflows/**"
              - ".github/actions/**"
            acp:
              - "libs/acp/**"
              - ".github/workflows/**"
              - ".github/actions/**"

  lint-cli:
    name: "🧹 Lint cli"
    needs: changes
    if: needs.changes.outputs.cli == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_lint.yml
    with:
      working-directory: "libs/cli"
      python-version: "3.11"

  test-cli:
    name: "🧪 Test cli"
    needs: changes
    if: needs.changes.outputs.cli == 'true' || github.event_name == 'push'
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false
    uses: ./.github/workflows/_test.yml
    with:
      working-directory: "libs/cli"
      python-version: ${{ matrix.python-version }}

  lint-rlmagents:
    name: "🧹 Lint rlmagents"
    needs: changes
    if: needs.changes.outputs.rlmagents == 'true' || github.event_name == 'push'
    runs-on: [self-hosted, Linux]
    timeout-minutes: 20
    steps:
      - name: "📋 Checkout Code"
        uses: actions/checkout@v6

      - name: "🐍 Set up Python + UV"
        uses: "./.github/actions/uv_setup"
        with:
          python-version: "3.11"
          cache-suffix: lint-libs/rlmagents
          working-directory: "libs/rlmagents"

      - name: "📦 Install Test Dependencies"
        working-directory: "libs/rlmagents"
        run: uv sync --group test --locked

      - name: "🔍 Run Ruff"
        working-directory: "libs/rlmagents"
        run: uv run ruff check rlmagents tests

  test-rlmagents:
    name: "🧪 Test rlmagents"
    needs: changes
    if: needs.changes.outputs.rlmagents == 'true' || github.event_name == 'push'
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false
    runs-on: [self-hosted, Linux]
    timeout-minutes: 30
    steps:
      - name: "📋 Checkout Code"
        uses: actions/checkout@v6

      - name: "🐍 Set up Python ${{ matrix.python-version }} + UV"
        uses: "./.github/actions/uv_setup"
        with:
          python-version: ${{ matrix.python-version }}
          cache-suffix: test-libs/rlmagents
          working-directory: "libs/rlmagents"

      - name: "📦 Install Test Dependencies"
        working-directory: "libs/rlmagents"
        run: uv sync --group test --locked

      - name: "🧪 Run Tests"
        working-directory: "libs/rlmagents"
        run: uv run pytest tests -q

      - name: "🧹 Verify Clean Working Directory"
        shell: bash
        run: |
          set -eu
          STATUS="$(git status)"
          echo "$STATUS"
          echo "$STATUS" | grep 'nothing to commit, working tree clean'

  test-acp-allowlist:
    name: "🧪 Test acp allowlist"
    needs: changes
    if: needs.changes.outputs.acp == 'true' || github.event_name == 'push'
    runs-on: [self-hosted, Linux]
    timeout-minutes: 10
    steps:
      - name: "📋 Checkout Code"
        uses: actions/checkout@v6

      - name: "🐍 Set up Python + UV"
        uses: "./.github/actions/uv_setup"
        with:
          python-version: "3.12"
          cache-suffix: test-libs/acp
          working-directory: "libs/acp"

      - name: "📦 Install Test Dependencies"
        working-directory: "libs/acp"
        run: uv sync --group test --locked

      - name: "🧪 Run allowlist test"
        working-directory: "libs/acp"
        run: uv run pytest tests/test_command_allowlist.py -q

  # Final status check - ensures all jobs passed
  ci_success:
    name: "✅ CI Success"
    needs:
      - changes
      - lint-cli
      - test-cli
      - lint-rlmagents
      - test-rlmagents
      - test-acp-allowlist
    if: always()
    runs-on: [self-hosted, Linux]
    steps:
      - name: "🎉 All Checks Passed"
        run: |
          # Get all job results (excluding 'changes' which always succeeds)
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"

          # Check for failures or cancellations
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "Some jobs failed or were cancelled"
            exit 1
          fi

          echo "All required checks passed (skipped jobs are OK)"
          exit 0
