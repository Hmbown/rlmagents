# Publishes rlmagents package artifacts to PyPI when a GitHub release is published.
#
# This enables human-in-the-loop publication for any release flow that publishes GitHub assets:
# 1. release.yml can create a release with auto-generated notes
# 2. Maintainer edits the release notes in GitHub UI
# 3. Maintainer clicks "Publish release" (or release is already published)
# 4. This workflow triggers and publishes to PyPI from release assets

name: "📦 Publish Release"
run-name: "Publish ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g., rlmagents==0.0.2)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish-release-artifacts:
    # PyPI trusted-publisher must be configured with environment "pypi" to match.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'rlmagents==')
    runs-on: [self-hosted, Linux]
    environment: pypi

    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Verify runner prerequisites
        shell: bash
        run: |
          set -eu
          gh --version
          uv --version

      - name: Resolve release tag
        id: resolve-tag
        shell: bash
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag }}"
          else
            TAG_NAME="${{ github.event.release.tag_name }}"
          fi

          if ! [[ "$TAG_NAME" =~ ^rlmagents== ]]; then
            echo "Error: Tag '$TAG_NAME' does not start with 'rlmagents=='"
            exit 1
          fi

          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf dist
          mkdir -p dist
          cd dist
          gh release download "${{ steps.resolve-tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.whl"
          gh release download "${{ steps.resolve-tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.tar.gz"
          ls -la

      - name: Publish to PyPI
        shell: bash
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          set -eu
          TOKEN="${PYPI_API_TOKEN:-}"
          if [ -z "$TOKEN" ]; then
            TOKEN="${PYPI_TOKEN:-}"
          fi

          if [ -n "$TOKEN" ]; then
            echo "Using API token fallback for publish."
            uv publish dist/* --token "$TOKEN" --check-url https://pypi.org/simple/
          else
            echo "No API token found, using trusted publishing."
            uv publish dist/* --trusted-publishing always --check-url https://pypi.org/simple/
          fi
