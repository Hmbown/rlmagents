# Creates release PRs based on conventional commits.
#
# When commits land on main, release-please analyzes them and either:
# - Creates/updates a release PR with changelog and version bump
# - When a release PR is merged, triggers the release workflow
#
# GitHub releases are created by release.yml after all checks pass,
# not by release-please directly (skip-github-release: true in config).

name: Release Please

on:
  push:
    branches:
      - main

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      rlmagents-release: ${{ steps.check-releases.outputs.rlmagents-release }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Detect package releases by checking which package CHANGELOG.md files
      # changed in this merge commit. release-please always updates CHANGELOG.md
      # when merging a release PR.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check which release PR was merged
        id: check-releases
        run: |
          changed_files="$(git diff --name-only HEAD~1 HEAD)"

          if echo "$changed_files" | grep -q "^libs/rlmagents/CHANGELOG.md$"; then
            echo "rlmagents-release=true" >> $GITHUB_OUTPUT
            echo "rlmagents CHANGELOG.md was modified - this is an rlmagents release commit"
          else
            echo "rlmagents-release=false" >> $GITHUB_OUTPUT
          fi

  # Update uv.lock files when release-please creates/updates a PR
  # release-please updates pyproject.toml versions but doesn't regenerate lockfiles
  # https://github.com/googleapis/release-please/issues/2561
  update-lockfiles:
    needs: release-please
    if: needs.release-please.outputs.pr != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v6
        with:
          ref: ${{ fromJson(needs.release-please.outputs.pr).headBranchName }}

      - name: Set up Python + UV
        uses: "./.github/actions/uv_setup"
        with:
          python-version: "3.12"

      - name: Update lockfiles
        run: make lock

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*/uv.lock'
          if git diff --staged --quiet; then
            echo "No lockfile changes to commit"
          else
            git commit -m "chore: update lockfiles"
            git push
          fi

  # Trigger release workflow when rlmagents release PR is merged
  # GitHub release is created by release.yml AFTER all checks pass
  release-rlmagents:
    needs: release-please
    if: needs.release-please.outputs.rlmagents-release == 'true'
    uses: ./.github/workflows/release.yml
    with:
      package: rlmagents
    permissions:
      contents: write
      id-token: write
      # write needed to update PR label from "autorelease: pending" to "autorelease: tagged"
      pull-requests: write
