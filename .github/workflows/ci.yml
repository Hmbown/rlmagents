# Main CI workflow for RLMAgents monorepo
#
# Runs on every pull request and push to main:
# - Lockfile verification
# - Linting for changed packages
# - Unit tests for changed packages
#
# Only packages with changes are tested. Workflow/action changes run full CI.
# Pushes to main run full CI.

name: "CI"

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

# Cancel redundant workflow runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  UV_NO_SYNC: "true"

jobs:
  # Verify all lockfiles are up-to-date (runs in parallel with change detection)
  lockfiles:
    name: "Lockfiles"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: "./.github/actions/uv_setup"
        with:
          python-version: "3.12"
      - run: make lock-check

  # Detect which packages have changes
  changes:
    name: "Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      rlmagents: ${{ steps.filter.outputs.rlmagents }}
      acp: ${{ steps.filter.outputs.acp }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            cli:
              - "libs/cli/**"
              - "libs/rlmagents/**"
              - ".github/workflows/**"
              - ".github/actions/**"
            rlmagents:
              - "libs/rlmagents/**"
              - ".github/workflows/**"
              - ".github/actions/**"
            acp:
              - "libs/acp/**"
              - ".github/workflows/**"
              - ".github/actions/**"

  lint-cli:
    name: "Lint cli"
    needs: changes
    if: needs.changes.outputs.cli == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_lint.yml
    with:
      working-directory: "libs/cli"
      python-version: "3.11"

  test-cli:
    name: "Test cli"
    needs: changes
    if: needs.changes.outputs.cli == 'true' || github.event_name == 'push'
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false
    uses: ./.github/workflows/_test.yml
    with:
      working-directory: "libs/cli"
      python-version: ${{ matrix.python-version }}

  lint-rlmagents:
    name: "Lint rlmagents"
    needs: changes
    if: needs.changes.outputs.rlmagents == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: "./.github/actions/uv_setup"
        with:
          python-version: "3.11"
          cache-suffix: lint-libs/rlmagents
          working-directory: "libs/rlmagents"
      - name: "Install Dependencies"
        working-directory: "libs/rlmagents"
        run: uv sync --group test --locked
      - name: "Ruff"
        working-directory: "libs/rlmagents"
        run: uv run ruff check rlmagents tests

  test-rlmagents:
    name: "Test rlmagents"
    needs: changes
    if: needs.changes.outputs.rlmagents == 'true' || github.event_name == 'push'
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: "./.github/actions/uv_setup"
        with:
          python-version: ${{ matrix.python-version }}
          cache-suffix: test-libs/rlmagents
          working-directory: "libs/rlmagents"
      - name: "Install Dependencies"
        working-directory: "libs/rlmagents"
        run: uv sync --group test --locked
      - name: "Tests"
        working-directory: "libs/rlmagents"
        run: uv run pytest tests -q
      - name: "Verify Clean Working Directory"
        shell: bash
        run: |
          set -eu
          STATUS="$(git status)"
          echo "$STATUS"
          echo "$STATUS" | grep 'nothing to commit, working tree clean'

  test-acp:
    name: "Test acp"
    needs: changes
    if: needs.changes.outputs.acp == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: "./.github/actions/uv_setup"
        with:
          python-version: "3.12"
          cache-suffix: test-libs/acp
          working-directory: "libs/acp"
      - name: "Install Dependencies"
        working-directory: "libs/acp"
        run: uv sync --group test --locked
      - name: "Tests"
        working-directory: "libs/acp"
        run: uv run pytest tests/test_command_allowlist.py -q

  # Final status gate - ensures all jobs passed
  ci-pass:
    name: "CI"
    needs:
      - lockfiles
      - changes
      - lint-cli
      - test-cli
      - lint-rlmagents
      - test-rlmagents
      - test-acp
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "Check Results"
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "Some jobs failed or were cancelled"
            exit 1
          fi
          echo "All required checks passed (skipped jobs are OK)"
          exit 0
