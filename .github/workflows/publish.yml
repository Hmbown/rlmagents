# Publishes rlmagents package artifacts to PyPI when a GitHub release is published.
#
# This enables human-in-the-loop publication for any release flow that publishes GitHub assets:
# 1. release.yml can create a release with auto-generated notes
# 2. Maintainer edits the release notes in GitHub UI
# 3. Maintainer clicks "Publish release" (or release is already published)
# 4. This workflow triggers and publishes to PyPI from release assets

name: "📦 Publish Release"
run-name: "Publish ${{ github.event.release.tag_name }}"

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish-release-artifacts:
    # Keep env unset to support PyPI trusted-publishers configured as "Environment: Any".
    if: startsWith(github.event.release.tag_name, 'rlmagents==')
    runs-on: [self-hosted, Linux]

    steps:
      - name: Verify runner prerequisites
        shell: bash
        run: |
          set -eu
          gh --version
          docker version

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          cd dist
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.whl"
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.tar.gz"
          ls -la

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          verbose: true
          print-hash: true
          attestations: false
